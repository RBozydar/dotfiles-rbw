background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    outer_color = rgba(82dcccff)
    inner_color = rgba(111826ee)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME
    color = rgba(ffffffff)
    font_size = 90
    font_family = Fira Sans
    position = 0, 150
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%Y-%m-%d"
    color = rgba(82dccccc)
    font_size = 22
    font_family = Fira Sans
    position = 0, 70
    halign = center
    valign = center
}
