# Hyprland 0.54.x — clean config
# https://wiki.hypr.land/Configuring/

$mainMod = SUPER


################
### MONITORS ###
################

# https://wiki.hypr.land/Configuring/Monitors/
monitor = DP-1, 5120x2160@180, auto, 1.333333
monitor = , preferred, auto, 1

xwayland {
    force_zero_scaling = true
}
env = GDK_SCALE,2


###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = thunar
$menu = wofi
$screenshot_area = grimblast copy area
$screenshot_window = grimblast copy active
$screenshot_screen = grimblast copy output


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = swww-daemon && swww img /usr/share/wallpapers/cachyos-wallpapers/Skyscraper.png
exec-once = fcitx5 -d
exec-once = hyprpolkitagent
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user import-environment
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_CURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,auto


#####################
### LOOK AND FEEL ###
#####################

# CachyOS colors
$cachylgreen  = rgba(82dcccff)
$cachymgreen  = rgba(00aa84ff)
$cachydgreen  = rgba(007d6fff)
$cachylblue   = rgba(01ccffff)
$cachymblue   = rgba(182545ff)
$cachydblue   = rgba(111826ff)

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 3
    col.active_border = $cachylgreen
    col.inactive_border = $cachymblue
    layout = dwindle

    snap {
        enabled = true
    }
}

decoration {
    rounding = 4
    active_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 15
        passes = 2
        xray = true
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = overshot,       0.13, 0.99, 0.29, 1.1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint,  popin 87%
    animation = windowsOut,    1, 1.49, linear,        popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint,  fade
    animation = layersOut,     1, 1.5,  linear,        fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear,  fade
    animation = workspacesIn,  1, 1.21, almostLinear,  fade
    animation = workspacesOut, 1, 1.94, almostLinear,  fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.8
}

master {
    new_status = master
    special_scale_factor = 0.8
}

group {
    col.border_active = $cachydgreen
    col.border_inactive = $cachylgreen
    col.border_locked_active = $cachymgreen
    col.border_locked_inactive = $cachydblue

    groupbar {
        font_family = Fira Sans
        text_color = $cachydblue
        col.active = $cachydgreen
        col.inactive = $cachylgreen
        col.locked_active = $cachymgreen
        col.locked_inactive = $cachydblue
    }
}

misc {
    font_family = Fira Sans
    disable_hyprland_logo = true
    col.splash = $cachylgreen
    background_color = $cachydblue
    enable_swallow = true
    swallow_regex = ^(nautilus|nemo|thunar|btrfs-assistant.)$
    focus_on_activate = true
    vrr = 2
}

render {
    direct_scanout = true
}


#############
### INPUT ###
#############

input {
    follow_mouse = 2
    float_switch_override_focus = 2
}

gesture = 3, horizontal, workspace


####################
### KEYBINDINGS  ###
####################

# App launchers
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod, Y, pin
bind = $mainMod, J, togglesplit,

# Grouping
bind = $mainMod, K, togglegroup,
bind = $mainMod, Tab, changegroupactive, f

# Clipboard history
bind = $mainMod, C, exec, cliphist list | wofi -d | cliphist decode | wl-copy
bind = $mainMod SHIFT, C, exec, cliphist wipe

# Screenshots
bind = , Print, exec, $screenshot_area
bind = CTRL, Print, exec, $screenshot_window
bind = ALT, Print, exec, $screenshot_screen

# Gaps toggle
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword general:gaps_out 5;keyword general:gaps_in 3"
bind = $mainMod, G, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"

# Volume (wpctl — pipewire native)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Lock
bind = $mainMod, L, exec, hyprlock

# Reload waybar
bind = $mainMod, O, exec, killall -SIGUSR2 waybar

# Session
bind = $mainMod SHIFT, M, exec, loginctl terminate-user ""

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
bind = , right, resizeactive, 15 0
bind = , left, resizeactive, -15 0
bind = , up, resizeactive, 0 -15
bind = , down, resizeactive, 0 15
bind = , l, resizeactive, 15 0
bind = , h, resizeactive, -15 0
bind = , k, resizeactive, 0 -15
bind = , j, resizeactive, 0 15
bind = , escape, submap, reset
submap = reset

# Quick resize
bind = $mainMod CTRL SHIFT, right, resizeactive, 15 0
bind = $mainMod CTRL SHIFT, left, resizeactive, -15 0
bind = $mainMod CTRL SHIFT, up, resizeactive, 0 -15
bind = $mainMod CTRL SHIFT, down, resizeactive, 0 15

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (follow)
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10
bind = $mainMod CTRL, left, movetoworkspace, -1
bind = $mainMod CTRL, right, movetoworkspace, +1

# Move window to workspace (silent)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll workspaces
bind = $mainMod, PERIOD, workspace, e+1
bind = $mainMod, COMMA, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, slash, workspace, previous

# Special workspace
bind = $mainMod, minus, movetoworkspace, special
bind = $mainMod, equal, togglespecialworkspace, special
bind = $mainMod, F1, togglespecialworkspace, scratchpad
bind = $mainMod ALT SHIFT, F1, movetoworkspacesilent, special:scratchpad

binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
    workspace_center_on = true
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Workspace rules
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3

# Layer rules
layerrule {
    name = anim-logout
    match:namespace = logout_dialog
    animation = slide top
}

layerrule {
    name = anim-waybar
    match:namespace = waybar
    animation = slide down
}

layerrule {
    name = anim-wallpaper
    match:namespace = wallpaper
    animation = fade 50%
}

# Window rules (0.54.x block syntax)

windowrule {
    name = float-pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = true
}

windowrule {
    name = float-pip
    match:title = ^(Picture in picture|Picture-in-Picture)$
    float = true
    size = 960 540
}

windowrule {
    name = float-dialogs
    match:title = ^(Save File|Open File)$
    float = true
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = true
}

windowrule {
    name = float-portals
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
    float = true
}

windowrule {
    name = float-polkit
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
    float = true
}

windowrule {
    name = float-cachyos
    match:class = ^(CachyOSHello|zenity)$
    float = true
}

windowrule {
    name = float-steam-updater
    match:title = ^(Steam - Self Updater)$
    float = true
}

windowrule {
    name = opacity-filemanager
    match:class = ^(thunar|nemo)$
    opacity = 0.92
}

windowrule {
    name = opacity-discord
    match:class = ^(discord|armcord|webcord)$
    opacity = 0.96
}

windowrule {
    name = noblur-firefox
    match:class = ^(org.mozilla.firefox)$
    no_blur = true
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
