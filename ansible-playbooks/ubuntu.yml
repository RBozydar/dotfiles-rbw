---
- hosts: ubuntu
  vars_files:
    - vars/main.yml
    - vars/packages.yml
  roles:
    - role: geerlingguy.docker
      become: yes
      docker_users:
        - rbw

  tasks:
  - name: Upgrade all packages
    become: yes
    ansible.builtin.apt:
      name: "*"
      state: latest
      update_cache: true

  - name: Ensure Ubuntu-specific packages are installed
    become: yes
    ansible.builtin.package:
      name: "{{ ubuntu_packages }}"
      state: present

  - name: Ensure Universe repository is enabled
    become: yes
    ansible.builtin.apt_repository:
      repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
      state: present
    tags:
      - packages

  - name: Codex sandbox prerequisites
    ansible.builtin.include_tasks: tasks/codex-sandbox.yml
    tags:
      - codex-sandbox

  - name: GH CLI
    ansible.builtin.include_tasks: tasks/gh-cli.yml
    tags:
      - gh-cli

  - name: Glow
    ansible.builtin.include_tasks: tasks/glow.yml
    tags:
      - glow

  - name: NVIDIA CUDA
    ansible.builtin.include_tasks: tasks/nvidia-cuda.yml
    tags:
      - nvidia

  - name: Homebrew
    ansible.builtin.include_tasks: tasks/homebrew.yml
    tags:
      - homebrew

  - name: Go
    ansible.builtin.include_tasks: tasks/golang.yml
    tags:
      - golang

  - name: Rust
    ansible.builtin.include_tasks: tasks/rustup.yml
    tags:
      - rust

  - name: Version managers (fnm, uv, bun)
    ansible.builtin.include_tasks: tasks/version-managers.yml
    tags:
      - version-managers

  - name: Symlinks
    ansible.builtin.include_tasks: tasks/symlinks.yml
    tags:
      - symlinks

  - name: Tmux TPM
    ansible.builtin.include_tasks: tasks/tmux.yml
    tags:
      - tmux
