---
  - name: Install base packages
    become: yes
    ansible.builtin.package:
      name: "{{ base_packages }}"
      state: present
    tags:
      - packages

  - name: Copy SSH public keys from Github
    ansible.posix.authorized_key:
      user: "{{ username }}"
      state: present
      key: https://github.com/rbozydar.keys

  - name: Create repo folder
    ansible.builtin.file:
      state: directory
      dest: "{{ user_home }}/repo"

  - name: Create compatibility symlink for legacy dotfiles path
    ansible.builtin.file:
      src: "{{ repo_root }}"
      dest: "{{ legacy_repo_root }}"
      state: link
      force: yes

  - name: Create empty .zsh_secrets if missing
    ansible.builtin.file:
      path: "{{ user_home }}/.zsh_secrets"
      state: touch
      mode: '0600'

  - name: Write .antigenrc
    ansible.builtin.copy:
      dest: "{{ user_home }}/.antigenrc"
      mode: '0644'
      content: |
        ZSH_COMPLETIONS_CACHE="$HOME/.antigen/bundles/robbyrussell/oh-my-zsh/cache/completions"
        if [[ -d "$ZSH_COMPLETIONS_CACHE" ]]; then
            (( ${fpath[(Ie)"$ZSH_COMPLETIONS_CACHE"]} )) || fpath=("$ZSH_COMPLETIONS_CACHE" $fpath)
        fi
        unset ZSH_COMPLETIONS_CACHE

        source $HOME/.antigen/antigen.zsh

        if [[ -d ~/.antigen-etc/use.d ]]; then
            for i in ~/.antigen-etc/use.d/*.zsh; do
                if [ -r $i ]; then
                    source $i
                fi
            done
            unset i
        fi

        if [[ -d ~/.antigen-etc/bundle.d ]]; then
            for i in ~/.antigen-etc/bundle.d/*.zsh; do
                if [ -r $i ]; then
                    source $i
                fi
            done
            unset i
        fi

        [[ -f ~/.antigen-etc/theme.zsh ]] && source ~/.antigen-etc/theme.zsh

        antigen apply
