---
  - name: Install base packages
    become: yes
    ansible.builtin.package:
      name: "{{ base_packages }}"
      state: present
    tags:
      - packages

  - name: Copy SSH public keys from Github
    ansible.posix.authorized_key:
      user: "{{ username }}"
      state: present
      key: https://github.com/rbozydar.keys

  - name: Create repo folder
    ansible.builtin.file:
      state: directory
      dest: "{{ user_home }}/repo"

  - name: Create compatibility symlink for legacy dotfiles path
    ansible.builtin.file:
      src: "{{ repo_root }}"
      dest: "{{ legacy_repo_root }}"
      state: link
      force: yes

  - name: Create empty .zsh_secrets if missing
    ansible.builtin.file:
      path: "{{ user_home }}/.zsh_secrets"
      state: touch
      mode: '0600'

  - name: Install antidote (zsh plugin manager)
    become: yes
    become_user: "{{ username }}"
    ansible.builtin.git:
      repo: https://github.com/mattmc3/antidote.git
      dest: "{{ user_home }}/.antidote"
      depth: 1
      version: main
      update: yes

  - name: Set zsh as default shell
    become: yes
    ansible.builtin.user:
      name: "{{ username }}"
      shell: /bin/zsh
