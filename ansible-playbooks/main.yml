- hosts: localhost
  gather_facts: true
  vars_files:
    - vars/main.yml
    - vars/packages.yml
  
  roles:
    - role: gantsign.antigen
      when: enable_antigen_role | bool
      users:
        - username: "{{ username }}"
          antigen_libraries:
            - name: oh-my-zsh
          antigen_theme:
            name: agnoster
          antigen_bundles:
            - name: git
            - name: common-aliases
            - name: docker
            - name: zsh-syntax-highlighting
              url: zsh-users/zsh-syntax-highlighting
            - name: zsh-completions
              url: zsh-users/zsh-completions
            - name: zsh-autosuggestions
              url: zsh-users/zsh-autosuggestions
    - role: geerlingguy.git
      when:
        - enable_git_role | bool
        - ansible_os_family == 'Debian'
    - role : ansible-role-security
      when: enable_security_role | bool
      become: yes
    - role: andrewrothstein.miniconda
      when: enable_miniconda_role | bool

  tasks:
  - name: Init
    ansible.builtin.include_tasks: initial.yml
  - name: Ubuntu
    ansible.builtin.include_tasks: ubuntu.yml
    when: ansible_os_family == 'Debian'
  - name: Arch Linux
    ansible.builtin.include_tasks: arch.yml
    when: ansible_os_family == 'Archlinux'
  - name: Version managers
    ansible.builtin.include_tasks: tasks/version-managers.yml
    when: ansible_os_family in ['Debian', 'Archlinux']
    tags:
      - version-managers
  - name: i3
    ansible.builtin.include_tasks: i3.yml
    when: enable_i3 | bool
  # - name: conda init
