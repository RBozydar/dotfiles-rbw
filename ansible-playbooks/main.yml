- hosts: localhost
  gather_facts: true
  vars_files:
    - vars/main.yml
    - vars/packages.yml

  roles:
    - role: geerlingguy.docker
      when: ansible_facts['os_family'] == 'Debian'
      become: yes
      docker_users:
        - "{{ username }}"
    - role: geerlingguy.git
      when:
        - enable_git_role | bool
        - ansible_facts['os_family'] == 'Debian'
    - role: ansible-role-security
      when: enable_security_role | bool
      become: yes

  tasks:
  # Base setup (packages, SSH, repo folder, antidote, zsh_secrets)
  - name: Init
    ansible.builtin.include_tasks: initial.yml

  - name: Detect NVIDIA GPU
    ansible.builtin.include_tasks:
      file: tasks/nvidia-detect.yml
      apply:
        tags:
          - always
    when: ansible_facts['system'] == 'Linux'
    tags:
      - always

  # Distro-specific packages and repos
  - name: Ubuntu
    ansible.builtin.include_tasks: ubuntu.yml
    when: ansible_facts['os_family'] == 'Debian'
    tags:
      - nvidia
  - name: Arch Linux
    ansible.builtin.include_tasks: arch.yml
    when: ansible_facts['os_family'] == 'Archlinux'
    tags:
      - nvidia

  # Common tools (distro-agnostic, curl-based installers)
  - name: Go
    ansible.builtin.include_tasks: tasks/golang.yml
    tags:
      - golang
  - name: Rust
    ansible.builtin.include_tasks: tasks/rustup.yml
    tags:
      - rust
  - name: Version managers (fnm, uv, bun)
    ansible.builtin.include_tasks: tasks/version-managers.yml
    tags:
      - version-managers
  - name: Miniforge3
    ansible.builtin.include_tasks: tasks/miniforge.yml
    tags:
      - miniforge

  # Common config (after all packages installed)
  - name: Symlinks
    ansible.builtin.include_tasks: tasks/symlinks.yml
    tags:
      - symlinks
  - name: Tmux
    ansible.builtin.include_tasks: tasks/tmux.yml
    tags:
      - tmux

  handlers:
    - name: Restart NetworkManager
      become: yes
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted
